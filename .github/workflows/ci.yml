name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true

      - name: Verify fork module path
        shell: bash
        run: |
          set -euo pipefail
          test "$(go list -m)" = "github.com/f4ah6o/aistat/v2"
          if git grep -n 'github.com/drogers0/aistat/v2' -- '*.go' 'go.mod' 'README.md' '.goreleaser.yaml' '.github/workflows/*.yml'; then
            echo 'old upstream Go module path remains' >&2
            exit 1
          fi

      - name: Build CLI
        run: go build -trimpath ./cmd/aistat

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

  fake-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Build fake-tag CLI
        run: go build -trimpath -tags=fake ./cmd/aistat
      - name: Test fake-tag packages
        run: go test -race -tags=fake ./...
